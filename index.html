<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coremetix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            background: #fbf9fd;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .logo-wrap {
            text-align: center;
        }
        .logo-wrap img {
            width: 480px;
            max-width: 90vw;
            height: auto;
            display: block;
        }
        @media (max-width: 768px) {
            body {
                justify-content: flex-start;
                padding-top: 33.333vh;
            }
        }
    </style>
</head>
<body>
    <div class="logo-wrap">
        <img src="logo.png" alt="Coremetix">
    </div>
</body>
</html>
