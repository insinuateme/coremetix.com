<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coremetix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            background: #f0f2f7;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .logo-wrap {
            text-align: center;
        }
        .logo-wrap svg {
            width: 320px;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="logo-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
            <defs>
                <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#0f2b5b"/>
                    <stop offset="100%" stop-color="#1a4a8a"/>
                </linearGradient>
                <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#1a4a8a"/>
                    <stop offset="100%" stop-color="#3a7bd5"/>
                </linearGradient>
                <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#3a7bd5"/>
                    <stop offset="100%" stop-color="#6fb3f2"/>
                </linearGradient>
            </defs>
            <ellipse cx="155" cy="140" rx="95" ry="130" transform="rotate(-30 155 140)" fill="url(#g1)" opacity="0.9"/>
            <ellipse cx="245" cy="140" rx="95" ry="130" transform="rotate(30 245 140)" fill="url(#g3)" opacity="0.85"/>
            <ellipse cx="200" cy="125" rx="70" ry="120" fill="url(#g2)" opacity="0.7"/>
            <text x="200" y="330" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="300" letter-spacing="2">
                <tspan fill="#0f2b5b">coremet</tspan><tspan fill="#3a7bd5">ix</tspan>
            </text>
        </svg>
    </div>
</body>
</html>
